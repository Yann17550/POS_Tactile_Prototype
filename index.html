<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Tactile V3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header catégories -->
    <header id="categories">
        <div class="category active" data-cat="pizzas">🍕 PIZZAS</div>
    </header>

    <!-- Contenu principal : GAUCHE articles / DROITE commande -->
    <div class="main-content">
        <!-- GAUCHE : Grille fixe 5 colonnes -->
        <section id="products-section">
            <div id="products-grid" class="product-grid-5">
                <!-- 1 seul produit + cases vides -->
                <div class="product-btn reine active" data-product="reine">
                    <div class="product-icon">👑</div>
                    <div class="product-name">REINE</div>
                    <div class="product-price" data-price="12.00">12€</div>
                </div>
                <!-- Cases vides pour grille 5xN -->
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <!-- Ligne suivante -->
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
                <div class="product-empty"></div>
            </div>
        </section>

        <!-- DROITE : Commande -->
        <aside id="order-panel">
            <!-- Header compact (caché si emporté) -->
            <div id="order-header" class="order-header">
                <div class="header-row">
                    <label>T:</label>
                    <input type="text" id="table-num" maxlength="3" value="1" size="3">
                    <label>C:</label>
                    <input type="number" id="covers" min="1" max="99" value="2" size="2">
                </div>
                <div class="header-row">
                    <label>Type:</label>
                    <select id="order-type">
                        <option>Sur place</option>
                        <option>À emporter</option>
                    </select>
                </div>
            </div>
            
            <!-- Liste commande -->
            <div id="order-items" class="order-list"></div>
            
            <!-- Footer -->
            <div class="order-footer">
                <button id="pay-btn" class="btn-large">💳 PAYER</button>
                <div class="total-line">
                    <span id="total">0€</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals (inchangés) -->
    <div id="modal-price" class="modal"><!-- même que V2 --></div>
    <div id="modal-comp" class="modal"><!-- même que V2 --></div>
    <div id="modal-order-price" class="modal"><!-- même que V2 --></div>

    <script src="app.js"></script>
</body>
</html>
